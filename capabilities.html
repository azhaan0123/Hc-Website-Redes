/* ── Awwwards & CSS Design Awards Clean Design System ──────────────────────── */
:root {
  --hc-primary-rgb: 227, 33, 104; /* #e32168 */
  --hc-accent-rgb: 251, 91, 135;  /* #fb5b87 */
}

/* 1. Glassmorphic Cards & Elevated Surfaces (.hc-grid-cell, .arlo-grid-cell, .bg-card) */
/* Clean surface styling without forced borders, backgrounds, overflow clipping, or physical layout shifts */
.hc-grid-cell, .arlo-grid-cell, .bg-card {
  transition: background-color 0.35s cubic-bezier(0.16, 1, 0.3, 1), border-color 0.35s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.35s cubic-bezier(0.16, 1, 0.3, 1);
}
.hc-grid-cell:hover, .arlo-grid-cell:hover, .bg-card:hover {
  border-color: rgba(var(--hc-primary-rgb), 0.35) !important;
  box-shadow: 0 12px 32px -8px rgba(0, 0, 0, 0.08), 0 0 0 1px rgba(var(--hc-primary-rgb), 0.12);
}
.dark .hc-grid-cell:hover, .dark .arlo-grid-cell:hover, .dark .bg-card:hover {
  border-color: rgba(255, 255, 255, 0.2) !important;
  box-shadow: 0 12px 32px -8px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.12);
}

/* 2. Precision Badges & Pills (.hc-pill, .arlo-pill) */
.hc-pill, .arlo-pill {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.35rem 1rem;
  border-radius: 9999px;
  font-size: 0.75rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  background: rgba(var(--hc-primary-rgb), 0.08);
  border: 1px solid rgba(var(--hc-primary-rgb), 0.25);
  color: #e32168;
  transition: background-color 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
}
.dark .hc-pill, .dark .arlo-pill {
  background: rgba(var(--hc-primary-rgb), 0.15);
  border-color: rgba(var(--hc-primary-rgb), 0.4);
  color: #fb5b87;
}
.hc-pill:hover, .arlo-pill:hover {
  background: rgba(var(--hc-primary-rgb), 0.14);
  border-color: rgba(var(--hc-primary-rgb), 0.45);
  box-shadow: 0 4px 12px -2px rgba(var(--hc-primary-rgb), 0.2);
}
/* Live pulsing indicator dot inside badges */
.hc-pill::before, .arlo-pill::before {
  content: "";
  display: inline-block;
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background-color: currentColor;
  box-shadow: 0 0 8px currentColor;
  animation: hcPulse 2s infinite ease-in-out;
