/* ── Awwwards & CSS Design Awards Clean Design System ──────────────────────── */
:root {
  --hc-primary-rgb: 227, 33, 104; /* #e32168 */
  --hc-accent-rgb: 251, 91, 135;  /* #fb5b87 */
}

/* 1. Glassmorphic Cards & Elevated Surfaces (.hc-grid-cell, .arlo-grid-cell, .bg-card) */
/* Clean surface styling without forced borders, backgrounds, overflow clipping, or physical layout shifts */
.hc-grid-cell, .arlo-grid-cell, .bg-card {
  transition: background-color 0.35s cubic-bezier(0.16, 1, 0.3, 1), border-color 0.35s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.35s cubic-bezier(0.16, 1, 0.3, 1);
}
.hc-grid-cell:hover, .arlo-grid-cell:hover, .bg-card:hover {
  border-color: rgba(var(--hc-primary-rgb), 0.35) !important;
  box-shadow: 0 12px 32px -8px rgba(0, 0, 0, 0.08), 0 0 0 1px rgba(var(--hc-primary-rgb), 0.12);
}
.dark .hc-grid-cell:hover, .dark .arlo-grid-cell:hover, .dark .bg-card:hover {
  border-color: rgba(255, 255, 255, 0.2) !important;
  box-shadow: 0 12px 32px -8px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.12);
}

/* 2. Precision Badges & Pills (.hc-pill, .arlo-pill) */
.hc-pill, .arlo-pill {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.35rem 1rem;
  border-radius: 9999px;
  font-size: 0.75rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  background: rgba(var(--hc-primary-rgb), 0.08);
  border: 1px solid rgba(var(--hc-primary-rgb), 0.25);
  color: #e32168;
  transition: background-color 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
}
.dark .hc-pill, .dark .arlo-pill {
  background: rgba(var(--hc-primary-rgb), 0.15);
  border-color: rgba(var(--hc-primary-rgb), 0.4);
  color: #fb5b87;
}
.hc-pill:hover, .arlo-pill:hover {
  background: rgba(var(--hc-primary-rgb), 0.14);
  border-color: rgba(var(--hc-primary-rgb), 0.45);
  box-shadow: 0 4px 12px -2px rgba(var(--hc-primary-rgb), 0.2);
}
/* Live pulsing indicator dot inside badges */
.hc-pill::before, .arlo-pill::before {
  content: "";
  display: inline-block;
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background-color: currentColor;
  box-shadow: 0 0 8px currentColor;
  animation: hcPulse 2s infinite ease-in-out;
}
@keyframes hcPulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.4; transform: scale(0.8); }
}

/* 3. Section Labels (.hc-section-label) */
.hc-section-label {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  font-size: 0.75rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: #e32168;
}
.dark .hc-section-label {
  color: #fb5b87;
}
.hc-section-label::before {
  content: "";
  display: inline-block;
  width: 14px;
  height: 2px;
  background: currentColor;
  border-radius: 1px;
  opacity: 0.8;
}

/* 4. Editorial Headings & Typography Polish */
/* Clean typography without forced inline-block or transparent text clipping that breaks word wrap and underlines */
main h1 span.text-primary, main h2 span.text-primary, main h3 span.text-primary {
  color: #e32168;
}
.dark main h1 span.text-primary, .dark main h2 span.text-primary, .dark main h3 span.text-primary {
  color: #fb5b87;
}
main h1 span.underline, main h2 span.underline {
  text-decoration-color: rgba(var(--hc-primary-rgb), 0.4);
  text-underline-offset: 8px;
}

/* 5. Interactive Feature Boxes & Micro-interactions */
/* No horizontal translation on hover to prevent overlapping adjacent grid columns */
main .bg-muted\/40, main .bg-muted\/30, .arlo-feature-row {
  transition: background-color 0.35s cubic-bezier(0.16, 1, 0.3, 1), border-color 0.35s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.35s cubic-bezier(0.16, 1, 0.3, 1);
}
main .bg-muted\/40:hover, main .bg-muted\/30:hover, .arlo-feature-row:hover {
  background-color: rgba(var(--hc-primary-rgb), 0.04) !important;
  border-color: rgba(var(--hc-primary-rgb), 0.25) !important;
  box-shadow: 0 4px 14px -2px rgba(0, 0, 0, 0.04);
}
main .w-6.h-6.rounded-full.bg-primary, main .w-5.h-5.rounded-full.bg-primary\/20, .arlo-timeline-node {
  box-shadow: 0 2px 8px rgba(var(--hc-primary-rgb), 0.25);
  transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.3s ease;
}
main .bg-muted\/40:hover .w-6.h-6.rounded-full.bg-primary,
main .bg-muted\/40:hover .w-5.h-5.rounded-full.bg-primary\/20,
main .bg-muted\/30:hover .w-6.h-6.rounded-full.bg-primary,
main .bg-muted\/30:hover .w-5.h-5.rounded-full.bg-primary\/20,
.arlo-feature-row:hover .arlo-timeline-node {
  transform: scale(1.1);
  box-shadow: 0 4px 12px rgba(var(--hc-primary-rgb), 0.4);
}

/* 6. Precision CTAs & Buttons */
main a.bg-primary, main button.bg-primary, main button[type="submit"] {
  transition: background-color 0.3s ease, box-shadow 0.3s ease, opacity 0.3s ease;

main a.bg-primary:hover, main button.bg-primary:hover, main button[type="submit"]:hover {

.hc-accordion-trigger:hover {

.justify-left { justify-content: flex-start; text-align: left; }
.aspect-4\/3 { aspect-ratio: 4 / 3; }

/* Typography & Fonts */
.font-display { font-family: var(--font-display, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif); }
.font-extrabold { font-weight: 800; }
.font-normal { font-weight: 400; }
.leading-\[1\.04\] { line-height: 1.04; }
.underline-offset-8 { text-underline-offset: 8px; }

/* Colors & Backgrounds */
.bg-\[\#00DD8C\] { background-color: #00DD8C; }
.bg-\[\#081E13\] { background-color: #081E13; }
.bg-\[\#FAFAF7\] { background-color: #FAFAF7; }
.dark .dark\:bg-\[\#0A1612\] { background-color: #0A1612; }
.hover\:bg-\[\#00c27b\]:hover { background-color: #00c27b; }
.text-\[\#081E13\] { color: #081E13; }
.to-accent\/30 { --tw-gradient-to: rgba(var(--hc-accent-rgb), 0.3); }
.focus\:ring-primary\/40:focus { --tw-ring-color: rgba(var(--hc-primary-rgb), 0.4); }

/* Dividers & Spacing */
.divide-y > * + * { border-top-width: 1px; border-top-style: solid; border-color: inherit; }
.divide-border\/60 > * + * { border-color: rgba(var(--border-rgb, 229, 231, 235), 0.6); }
.p-3\.5 { padding: 0.875rem; }
.space-y-16 > * + * { margin-top: 4rem; }

/* Prose Styling */
.prose { max-width: 65ch; color: var(--foreground, #374151); }
.prose h1, .prose h2, .prose h3, .prose h4 { color: var(--foreground, #111827); font-weight: 700; margin-top: 1.5em; margin-bottom: 0.5em; }
.prose p, .prose ul, .prose ol { margin-top: 1em; margin-bottom: 1em; line-height: 1.75; }
.prose a { color: #e32168; text-decoration: underline; font-weight: 500; }
.prose strong { color: var(--foreground, #111827); font-weight: 600; }
.prose ul { list-style-type: disc; padding-left: 1.625em; }
.prose ol { list-style-type: decimal; padding-left: 1.625em; }
.prose-lg { font-size: 1.125rem; line-height: 1.7777778; }

/* Arbitrary Child Selectors ([&_...]) */
.\[\&_a\]\:hover\:text-primary\/80 a:hover { color: rgba(var(--hc-primary-rgb), 0.8); }
.\[\&_a\]\:text-primary a { color: #e32168; }
.\[\&_a\]\:underline a { text-decoration: underline; }
.\[\&_h2\]\:border-b h2 { border-bottom-width: 1px; }
.\[\&_h2\]\:border-border\/40 h2 { border-color: rgba(var(--border-rgb, 229, 231, 235), 0.4); }
.\[\&_h2\]\:font-bold h2 { font-weight: 700; }
.\[\&_h2\]\:font-display h2 { font-family: var(--font-display, ui-sans-serif, system-ui, sans-serif); }
.\[\&_h2\]\:mb-6 h2 { margin-bottom: 1.5rem; }
.\[\&_h2\]\:mt-12 h2 { margin-top: 3rem; }
.\[\&_h2\]\:pb-4 h2 { padding-bottom: 1rem; }
.\[\&_h2\]\:text-2xl h2 { font-size: 1.5rem; line-height: 2rem; }
.\[\&_h2\]\:text-foreground h2 { color: var(--foreground); }
.\[\&_h2\]\:tracking-tight h2 { letter-spacing: -0.025em; }
.\[\&_h3\]\:font-bold h3 { font-weight: 700; }
.\[\&_h3\]\:font-display h3 { font-family: var(--font-display, ui-sans-serif, system-ui, sans-serif); }
.\[\&_h3\]\:mb-4 h3 { margin-bottom: 1rem; }
.\[\&_h3\]\:mt-8 h3 { margin-top: 2rem; }
.\[\&_h3\]\:text-foreground h3 { color: var(--foreground); }
.\[\&_h3\]\:text-xl h3 { font-size: 1.25rem; line-height: 1.75rem; }
.\[\&_ol\]\:list-decimal ol { list-style-type: decimal; }
.\[\&_ol\]\:mb-6 ol { margin-bottom: 1.5rem; }
.\[\&_ol\]\:pl-6 ol { padding-left: 1.5rem; }
.\[\&_ol\]\:space-y-2 ol > * + * { margin-top: 0.5rem; }
.\[\&_p\]\:leading-relaxed p { line-height: 1.625; }
.\[\&_p\]\:mb-4 p { margin-bottom: 1rem; }
.\[\&_strong\]\:font-semibold strong { font-weight: 600; }
.\[\&_strong\]\:text-foreground strong { color: var(--foreground); }
.\[\&_svg\]\:pointer-events-none svg { pointer-events: none; }
.\[\&_svg\]\:shrink-0 svg { flex-shrink: 0; }
.\[\&_svg\]\:size-4 svg { width: 1rem; height: 1rem; }
.\[\&_table\]\:border-collapse table { border-collapse: collapse; }
.\[\&_table\]\:mb-6 table { margin-bottom: 1.5rem; }
.\[\&_table\]\:w-full table { width: 100%; }
.\[\&_td\]\:border td { border-width: 1px; }
.\[\&_td\]\:border-border\/40 td { border-color: rgba(var(--border-rgb, 229, 231, 235), 0.4); }
.\[\&_td\]\:p-3 td { padding: 0.75rem; }
.\[\&_th\]\:bg-muted\/50 th { background-color: rgba(var(--muted-rgb, 243, 244, 246), 0.5); }
.\[\&_th\]\:border th { border-width: 1px; }
.\[\&_th\]\:border-border\/40 th { border-color: rgba(var(--border-rgb, 229, 231, 235), 0.4); }
.\[\&_th\]\:font-semibold th { font-weight: 600; }
.\[\&_th\]\:p-3 th { padding: 0.75rem; }
